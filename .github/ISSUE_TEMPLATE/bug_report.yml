name: Bug Report
description: Report a bug in Torvyn
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can understand and reproduce the problem.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: The minimal steps to reproduce this bug.
      placeholder: |
        1. Run `torvyn init my-project --template source-sink`
        2. Modify `pipeline.toml` to set queue_depth = 0
        3. Run `torvyn run`
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or log output if available.
    validations:
      required: true

  - type: input
    id: torvyn-version
    attributes:
      label: Torvyn Version
      description: "Output of `torvyn --version`"
      placeholder: "torvyn 0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: "Output of `rustc --version`"
      placeholder: "rustc 1.78.0"
    validations:
      required: true

  - type: input
    id: wasmtime-version
    attributes:
      label: Wasmtime Version
      description: "Output of `wasmtime --version` or the version in Cargo.lock"
      placeholder: "wasmtime 21.0.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15.1 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: If possible, provide a minimal project or code snippet that reproduces the bug. A link to a repository is ideal.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severely does this affect your work?
      options:
        - "Low — cosmetic or minor inconvenience"
        - "Medium — workaround exists but it impairs productivity"
        - "High — blocks a major use case with no workaround"
        - "Critical — data loss, security issue, or crash"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us understand or fix this bug (screenshots, related issues, configuration files, etc.).
    validations:
      required: false
