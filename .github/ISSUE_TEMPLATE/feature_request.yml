name: Feature Request
description: Suggest a new feature or improvement for Torvyn
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem and your proposed solution so we can evaluate it effectively.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve? Describe the pain point or limitation you are experiencing.
      placeholder: "When I try to ..., I cannot ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like. Be as specific as practical.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered? Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the real-world scenario where this feature would be used. Concrete examples help us prioritize.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How broadly would this feature benefit the community?
      options:
        - "Narrow — specific to my use case"
        - "Moderate — useful to a category of users"
        - "Broad — benefits most Torvyn users"
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Willingness to Contribute
      description: Would you be willing to help implement this feature?
      options:
        - "Yes — I can submit a pull request"
        - "Partially — I can help with design or testing"
        - "No — I am requesting this as a user"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, references, mockups, or examples that help explain the feature.
    validations:
      required: false
