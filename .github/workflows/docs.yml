name: Documentation

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - 'docs/**'
      - 'crates/*/src/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'crates/*/src/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: docs-

      - name: Install mdBook and plugins
        run: |
          cargo install mdbook mdbook-mermaid mdbook-linkcheck mdbook-toc mdbook-admonish

      - name: Build Rustdoc (API Reference)
        run: |
          cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"

      - name: Build mdBook (Guides & Documentation)
        working-directory: docs
        run: mdbook build

      - name: Assemble site
        run: |
          mkdir -p _site

          # Landing page
          cp docs/landing/index.html _site/
          cp -r docs/landing/assets _site/assets 2>/dev/null || true

          # mdBook output
          cp -r docs/book _site/docs

          # Rustdoc output
          cp -r target/doc _site/api

          # Redirect /api/ root to the primary crate
          echo '<meta http-equiv="refresh" content="0; url=torvyn_types/index.html">' > _site/api/index.html

          # robots.txt
          cp docs/robots.txt _site/robots.txt

          # Generate sitemap
          bash docs/scripts/generate-sitemap.sh _site "https://torvyn.github.io/torvyn"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
